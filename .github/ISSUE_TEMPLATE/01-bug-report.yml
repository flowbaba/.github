name: 🐛 Bug Report
description: Report something that is broken or not working as expected.
title: "[Bug] "
labels: ["bug", "needs-triage"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search [existing issues](../issues?q=is%3Aissue) first to avoid duplicates.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-sentence description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that reliably trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, logs, or screenshots.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release version, tag, or commit SHA where the bug occurs.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      multiple: true
      options:
        - Production
        - Staging
        - Local / development
        - CI
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: OS, browser, runtime versions, or anything else relevant.
    validations:
      required: false
